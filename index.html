<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Ascent: Вершина</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0e14;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        #game-container {
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            border: 4px solid #3a4454;
            border-radius: 8px;
            image-rendering: pixelated; /* Сохраняем резкость пикселей */
        }
    </style>
</head>
<body>

<div id="game-container"></div>

<script>
// Настройки гор
const MOUNTAINS = [
    { name: "1. Эльбрус", height: "5642м", difficulty: "Легко", color: 0x8ecae6, holdsCount: 60, staminaDrain: 0.15 },
    { name: "2. Маттерхорн", height: "4478м", difficulty: "Средне", color: 0x219ebc, holdsCount: 45, staminaDrain: 0.25 },
    { name: "3. Серро-Торре", height: "3128м", difficulty: "Сложно", color: 0x023047, holdsCount: 35, staminaDrain: 0.35 },
    { name: "4. Эверест", height: "8848м", difficulty: "Экстрим", color: 0xffb703, holdsCount: 30, staminaDrain: 0.45 },
    { name: "5. К2 (Чогори)", height: "8611м", difficulty: "Смертельно", color: 0xfb8500, holdsCount: 22, staminaDrain: 0.60 }
];

let selectedMountain = MOUNTAINS[0];

// --- СЦЕНА 1: ГЛАВНОЕ МЕНЮ ---
class MenuScene extends Phaser.Scene {
    constructor() {
        super('MenuScene');
    }

    preload() {
        // Создаем простые пиксельные текстуры программно
        let canvas = this.textures.createCanvas('pixel_bg', 450, 800);
        let ctx = canvas.context;
        ctx.fillStyle = '#1a1c23';
        ctx.fillRect(0, 0, 450, 800);
        canvas.refresh();
    }

    create() {
        this.add.text(225, 80, 'PIXEL ASCENT', { fontSize: '38px', fill: '#e0a96d', fontStyle: 'bold' }).setOrigin(0.5);
        this.add.text(225, 120, 'ВЕРШИНА', { fontSize: '24px', fill: '#ffffff' }).setOrigin(0.5);

        this.add.text(225, 180, 'ВЫБЕРИТЕ ГОРУ ДЛЯ ВОСХОЖДЕНИЯ:', { fontSize: '14px', fill: '#a3b18a' }).setOrigin(0.5);

        let startY = 230;
        MOUNTAINS.forEach((m, index) => {
            let btnBg = this.add.rectangle(225, startY + index * 80, 360, 60, 0x2e313f).setInteractive();
            btnBg.setStrokeStyle(2, 0x4a4e69);

            let title = this.add.text(65, startY + index * 80 - 15, m.name, { fontSize: '18px', fill: '#ffffff', fontStyle: 'bold' });
            let info = this.add.text(65, startY + index * 80 + 10, `Высота: ${m.height} | Сложность: ${m.difficulty}`, { fontSize: '12px', fill: '#9a8c98' });

            btnBg.on('pointerover', () => btnBg.setFillStyle(0x4a4e69));
            btnBg.on('pointerout', () => btnBg.setFillStyle(0x2e313f));
            btnBg.on('pointerdown', () => {
                selectedMountain = m;
                this.scene.start('PlayScene');
            });
        });

        this.add.text(225, 750, 'Управление: Перетаскивай руки мышкой/тапом\nКнопка "СТРАХОВКА" или Пробел — вбить крюк', { fontSize: '11px', fill: '#8d99ae', align: 'center' }).setOrigin(0.5);
    }
}

// --- СЦЕНА 2: ИГРОВОЙ ПРОЦЕСС ---
class PlayScene extends Phaser.Scene {
    constructor() {
        super('PlayScene');
    }

    preload() {
        // Создаем пиксельного персонажа
        let bodyTex = this.textures.createCanvas('body', 24, 36);
        let ctx = bodyTex.context;
        ctx.fillStyle = '#d90429'; // Красная куртка
        ctx.fillRect(4, 4, 16, 28);
        ctx.fillStyle = '#2b2d42'; // Штаны
        ctx.fillRect(4, 24, 16, 12);
        ctx.fillStyle = '#ffb703'; // Каска
        ctx.fillRect(6, 0, 12, 8);
        bodyTex.refresh();

        // Пиксельные руки (перчатки)
        this.createHandTexture('hand_l', '#00f');
        this.createHandTexture('hand_r', '#0f0');

        // Зацепы
        let holdTex = this.textures.createCanvas('hold', 16, 16);
        ctx = holdTex.context;
        ctx.fillStyle = '#8d99ae';
        ctx.fillRect(2, 4, 12, 8);
        ctx.fillStyle = '#3a4454'; // Тень на камне
        ctx.fillRect(2, 10, 12, 2);
        holdTex.refresh();
    }

    createHandTexture(key, color) {
        let tex = this.textures.createCanvas(key, 16, 16);
        let ctx = tex.context;
        ctx.fillStyle = color;
        ctx.fillRect(4, 4, 8, 8);
        tex.refresh();
    }

    create() {
        // Физические границы мира (высота горы регулируется прокруткой камеры)
        this.worldHeight = 3000;
        this.physics.world.setBounds(0, 0, 450, this.worldHeight);

        // Настраиваем камеру
        this.cameras.main.setBounds(0, 0, 450, this.worldHeight);
        this.cameras.main.centerOn(225, this.worldHeight - 150);

        // Фон-градиент
        this.bg = this.add.graphics();
        this.bg.fillGradientStyle(0x050508, 0x050508, selectedMountain.color, selectedMountain.color, 1);
        this.bg.fillRect(0, 0, 450, this.worldHeight);

        // Генерация зацепов (holds)
        this.holds = this.physics.add.staticGroup();
        let currentY = this.worldHeight - 80;
        while (currentY > 100) {
            let x = Phaser.Math.Between(50, 400);
            let hold = this.holds.create(x, currentY, 'hold').setScale(1.5).refreshBody();
            hold.isHold = true;
            currentY -= Phaser.Math.Between(40, 80); // Расстояние зависит от сложности
        }

        // Создаем игрока
        this.climber = this.physics.add.sprite(225, this.worldHeight - 100, 'body');
        this.climber.setCollideWorldBounds(true);
        this.climber.body.setGravityY(300); // Гравитация тянет вниз

        // Создаем интерактивные руки
        this.leftHand = this.add.sprite(200, this.worldHeight - 140, 'hand_l').setInteractive({ draggable: true });
        this.rightHand = this.add.sprite(250, this.worldHeight - 140, 'hand_r').setInteractive({ draggable: true });

        // Связующие линии (руки-веревки)
        this.ropeGraphics = this.add.graphics();

        // Состояние страховки и стамины
        this.stamina = 100;
        this.maxReach = 90; // Максимальная длина рук
        this.anchors = [];
        this.maxAnchors = 5;
        this.isFalling = false;

        // Фиксация рук на зацепах
        this.leftHand.anchoredTo = null;
        this.rightHand.anchoredTo = null;

        // Инициализируем стартовые зацепы для рук
        this.snapHandToNearest(this.leftHand);
        this.snapHandToNearest(this.rightHand);

        // Логика перетаскивания (Drag & Drop)
        this.input.on('drag', (pointer, gameObject, dragX, dragY) => {
            if (this.isFalling) return;

            // Ограничиваем радиус движения руки вокруг тела
            let dist = Phaser.Math.Distance.Between(this.climber.x, this.climber.y, dragX, dragY);
            if (dist < this.maxReach) {
                gameObject.x = dragX;
                gameObject.y = dragY;
            } else {
                let angle = Phaser.Math.Angle.Between(this.climber.x, this.climber.y, dragX, dragY);
                gameObject.x = this.climber.x + Math.cos(angle) * this.maxReach;
                gameObject.y = this.climber.y + Math.sin(angle) * this.maxReach;
            }
            gameObject.anchoredTo = null; // Отцепляем при переносе
        });

        this.input.on('dragend', (pointer, gameObject) => {
            this.snapHandToNearest(gameObject);
        });

        // Клавиатура
        this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

        // Создаем интерфейс (UI)
        this.createUI();
    }

    snapHandToNearest(hand) {
        let nearestHold = null;
        let minDist = 35; // Радиус захвата зацепа

        this.holds.children.entries.forEach(hold => {
            let dist = Phaser.Math.Distance.Between(hand.x, hand.y, hold.x, hold.y);
            if (dist < minDist) {
                minDist = dist;
                nearestHold = hold;
            }
        });

        if (nearestHold) {
            hand.x = nearestHold.x;
            hand.y = nearestHold.y;
            hand.anchoredTo = nearestHold;
        } else {
            hand.anchoredTo = null;
        }
    }

    placeAnchor() {
        if (this.anchors.length >= this.maxAnchors || this.isFalling) return;

        let anchorY = this.climber.y;
        this.anchors.push(anchorY);

        // Отрисовываем пиксельный крюк на стене
        let hook = this.add.rectangle(this.climber.x, this.climber.y, 8, 12, 0xffd166);
        this.physics.add.existing(hook, true);

        this.updateUI();
    }

    update(time, delta) {
        this.ropeGraphics.clear();

        if (this.isFalling) {
            this.handleFall();
            this.drawRopes();
            return;
        }

        // Проверяем нажатие клавиши Space для установки страховки
        if (Phaser.Input.Keyboard.JustDown(this.spaceKey)) {
            this.placeAnchor();
        }

        let leftOk = this.leftHand.anchoredTo != null;
        let rightOk = this.rightHand.anchoredTo != null;

        // Расчет физики тела (свисание)
        if (leftOk && rightOk) {
            // Висит на обеих руках — физический центр стремится к средней точке между рук
            let targetX = (this.leftHand.x + this.rightHand.x) / 2;
            let targetY = (this.leftHand.y + this.rightHand.y) / 2 + 40;
            this.climber.x = Phaser.Math.Linear(this.climber.x, targetX, 0.1);
            this.climber.y = Phaser.Math.Linear(this.climber.y, targetY, 0.1);
            this.climber.body.setVelocity(0);
            this.stamina = Math.min(100, this.stamina + 0.1); // Стамина восстанавливается
        } 
        else if (leftOk) {
            this.handleOneHandClimb(this.leftHand);
        } 
        else if (rightOk) {
            this.handleOneHandClimb(this.rightHand);
        } 
        else {
            // Обе руки свободны — Срыв!
            this.triggerFall();
        }

        // Ограничение расстояния: тело не может улететь дальше длины рук от зацепа
        this.constrainBodyDistance(this.leftHand);
        this.constrainBodyDistance(this.rightHand);

        // Отрисовка "рук" (веревки от плеч до кистей)
        this.drawRopes();

        // Обновление стамины
        this.updateStaminaLogic();

        // Движение камеры вслед за альпинистом
        this.cameras.main.scrollY = Phaser.Math.Linear(this.cameras.main.scrollY, this.climber.y - 400, 0.05);

        // Обновление высотомера
        let progress = Math.round(((this.worldHeight - this.climber.y) / this.worldHeight) * 100);
        this.heightText.setText(`Высота: ${progress}%`);

        if (this.climber.y < 120) {
            this.winGame();
        }
    }

    handleOneHandClimb(activeHand) {
        // Вис на одной руке — тело качается под ней под действием маятника
        let angle = Phaser.Math.Angle.Between(activeHand.x, activeHand.y, this.climber.x, this.climber.y);
        let targetX = activeHand.x + Math.cos(angle) * (this.maxReach - 10);
        let targetY = activeHand.y + Math.sin(angle) * (this.maxReach - 10);

        this.climber.x = Phaser.Math.Linear(this.climber.x, targetX, 0.05);
        this.climber.y = Phaser.Math.Linear(this.climber.y, targetY, 0.05);
        this.climber.body.setVelocity(0);

        // Стамина тратится, так как нагрузка идет на одну руку
        this.stamina -= selectedMountain.staminaDrain;
    }

    constrainBodyDistance(hand) {
        if (!hand.anchoredTo) return;
        let dist = Phaser.Math.Distance.Between(this.climber.x, this.climber.y, hand.x, hand.y);
        if (dist > this.maxReach) {
            let angle = Phaser.Math.Angle.Between(hand.x, hand.y, this.climber.x, this.climber.y);
            this.climber.x = hand.x + Math.cos(angle) * this.maxReach;
            this.climber.y = hand.y + Math.sin(angle) * this.maxReach;
        }
    }

    updateStaminaLogic() {
        if (this.stamina <= 0) {
            this.triggerFall();
        }
        // Отрисовка UI шкалы стамины
        this.staminaFill.width = (this.stamina / 100) * 120;
        if (this.stamina < 30) {
            this.staminaFill.setFillStyle(0xd90429); // Красный, когда силы на исходе
        } else {
            this.staminaFill.setFillStyle(0x52b788);
        }
    }

    drawRopes() {
        this.ropeGraphics.lineStyle(4, 0xffffff, 1);
        // Левая рука
        this.ropeGraphics.lineBetween(this.climber.x - 8, this.climber.y - 10, this.leftHand.x, this.leftHand.y);
        // Правая рука
        this.ropeGraphics.lineBetween(this.climber.x + 8, this.climber.y - 10, this.rightHand.x, this.rightHand.y);

        // Отрисовка веревки к последней точке страховки
        if (this.anchors.length > 0) {
            this.ropeGraphics.lineStyle(2, 0xffb703, 0.5);
            this.ropeGraphics.lineBetween(this.climber.x, this.climber.y, this.climber.x, this.anchors[this.anchors.length - 1]);
        }
    }

    triggerFall() {
        if (this.isFalling) return;
        this.isFalling = true;
        this.climber.body.setGravityY(600);
        this.leftHand.anchoredTo = null;
        this.rightHand.anchoredTo = null;
    }

    handleFall() {
        // Симулируем падение рук вместе с телом
        this.leftHand.x = this.climber.x - 15;
        this.leftHand.y = this.climber.y - 10;
        this.rightHand.x = this.climber.x + 15;
        this.rightHand.y = this.climber.y - 10;

        // Ищем последнюю страховку
        if (this.anchors.length > 0) {
            let lastAnchorY = this.anchors[this.anchors.length - 1];
            // Веревка натягивается на расстоянии 120 пикселей ниже крюка
            if (this.climber.y >= lastAnchorY + 120) {
                this.isFalling = false;
                this.climber.y = lastAnchorY + 120;
                this.climber.body.setVelocity(0);
                this.stamina = 35; // Даем шанс спастись

                // Ловим ближайшие зацепы руками автоматически при остановке
                this.snapHandToNearest(this.leftHand);
                this.snapHandToNearest(this.rightHand);
            }
        } else {
            // Если страховки нет — падение до самого низа (Game Over)
            if (this.climber.y >= this.worldHeight - 50) {
                this.gameOver();
            }
        }
    }

    createUI() {
        // UI Контейнер, привязанный к экрану (не к камере)
        this.uiContainer = this.add.container(0, 0).setScrollFactor(0);

        // Задний фон панели UI
        let uiBg = this.add.rectangle(225, 35, 430, 55, 0x1a1c23, 0.85);
        uiBg.setStrokeStyle(2, 0x3a4454);
        this.uiContainer.add(uiBg);

        // Индикатор стамины
        this.uiContainer.add(this.add.text(20, 15, 'СИЛА:', { fontSize: '11px', fill: '#ffffff', fontStyle: 'bold' }));
        let staminaBg = this.add.rectangle(20, 30, 120, 15, 0x2b2d42).setOrigin(0, 0);
        this.staminaFill = this.add.rectangle(20, 30, 120, 15, 0x52b788).setOrigin(0, 0);
        this.uiContainer.add([staminaBg, this.staminaFill]);

        // Высотомер
        this.heightText = this.add.text(160, 25, 'Высота: 0%', { fontSize: '14px', fill: '#ffd166', fontStyle: 'bold' });
        this.uiContainer.add(this.heightText);

        // Страховки
        this.anchorText = this.add.text(280, 15, `КРЮКИ: ${this.maxAnchors - this.anchors.length}`, { fontSize: '11px', fill: '#ffffff' });
        this.uiContainer.add(this.anchorText);

        // Кнопка страховки для мобильных устройств
        let anchorBtn = this.add.rectangle(350, 35, 100, 30, 0xffb703).setInteractive();
        anchorBtn.setStrokeStyle(1, 0xffffff);
        let anchorBtnText = this.add.text(350, 35, 'КРЮК [Space]', { fontSize: '10px', fill: '#000000', fontStyle: 'bold' }).setOrigin(0.5);
        
        anchorBtn.on('pointerdown', () => this.placeAnchor());
        this.uiContainer.add([anchorBtn, anchorBtnText]);
    }

    updateUI() {
        this.anchorText.setText(`КРЮКИ: ${this.maxAnchors - this.anchors.length}`);
    }

    gameOver() {
        this.scene.pause();
        let overBg = this.add.rectangle(225, 400, 350, 200, 0x111115).setStrokeStyle(3, 0xd90429).setScrollFactor(0);
        let overText = this.add.text(225, 350, 'СОРВАЛСЯ!', { fontSize: '32px', fill: '#d90429', fontStyle: 'bold' }).setOrigin(0.5).setScrollFactor(0);
        let tipText = this.add.text(225, 390, 'Вбивай крючья страховки по пути,\nчтобы не падать до самого низа!', { fontSize: '12px', fill: '#8d99ae', align: 'center' }).setOrigin(0.5).setScrollFactor(0);
        
        let restartBtn = this.add.rectangle(225, 450, 180, 40, 0x2b2d42).setInteractive().setScrollFactor(0);
        restartBtn.setStrokeStyle(1, 0xffffff);
        let restartText = this.add.text(225, 450, 'В МЕНЮ', { fontSize: '14px', fill: '#ffffff' }).setOrigin(0.5).setScrollFactor(0);

        restartBtn.on('pointerdown', () => {
            this.scene.start('MenuScene');
        });
    }

    winGame() {
        this.scene.pause();
        let winBg = this.add.rectangle(225, 400, 350, 200, 0x111115).setStrokeStyle(3, 0x52b788).setScrollFactor(0);
        let winText = this.add.text(225, 350, 'ВЕРШИНА ВЗЯТА!', { fontSize: '28px', fill: '#52b788', fontStyle: 'bold' }).setOrigin(0.5).setScrollFactor(0);
        let scoreText = this.add.text(225, 390, `Ты успешно покорил вершину\n${selectedMountain.name}!`, { fontSize: '14px', fill: '#ffffff', align: 'center' }).setOrigin(0.5).setScrollFactor(0);

        let menuBtn = this.add.rectangle(225, 450, 180, 40, 0x2b2d42).setInteractive().setScrollFactor(0);
        menuBtn.setStrokeStyle(1, 0xffffff);
        let menuText = this.add.text(225, 450, 'В МЕНЮ', { fontSize: '14px', fill: '#ffffff' }).setOrigin(0.5).setScrollFactor(0);

        menuBtn.on('pointerdown', () => {
            this.scene.start('MenuScene');
        });
    }
}

// Конфигурация Phaser 3
const config = {
    type: Phaser.AUTO,
    width: 450,
    height: 800,
    parent: 'game-container',
    physics: {
        default: 'arcade',
        arcade: {
            gravity: { y: 0 },
            debug: false // Поставь true, если хочешь видеть хитбоксы физики
        }
    },
    scene: [MenuScene, PlayScene]
};

const game = new Phaser.Game(config);
</script>

</body>
</html>
